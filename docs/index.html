<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DLL Icon Forge - Guide</title>
    <meta name="description" content="Quick guide to DLL Icon Forge: features, supported formats, and workflows for Windows icon DLL files.">
    <link rel="stylesheet" href="./styles.css">
    <link rel="alternate" hreflang="it" href="./it/">
    <link rel="alternate" hreflang="en" href="./en/">
    <link rel="alternate" hreflang="fr" href="./fr/">
    <link rel="alternate" hreflang="es" href="./es/">
    <link rel="alternate" hreflang="de" href="./de/">
    <link rel="alternate" hreflang="x-default" href="./en/">
    <script>
      (function () {
        var supported = ["it","en","fr","es","de"];
        var preferred = (navigator.languages || [navigator.language || 'en'])
          .map(function (language) { return String(language).slice(0, 2).toLowerCase(); })
          .find(function (language) { return supported.indexOf(language) !== -1; }) || 'en';
        window.location.replace('./' + preferred + '/');
      }());
    </script>
  </head>
  <body>
    <main class="locale_gate" aria-labelledby="language-title">
      <a class="brand" href="./en/" aria-label="DLL Icon Forge">
        <span class="brand_mark" aria-hidden="true">DIF</span>
        <span>DLL Icon Forge</span>
      </a>
      <section>
        <p class="eyebrow">Language</p>
        <h1 id="language-title">DLL Icon Forge</h1>
        <div class="language_grid">
        <a href="./it/" lang="it" hreflang="it">Italiano</a>
        <a href="./en/" lang="en" hreflang="en">English</a>
        <a href="./fr/" lang="fr" hreflang="fr">Francais</a>
        <a href="./es/" lang="es" hreflang="es">Espanol</a>
        <a href="./de/" lang="de" hreflang="de">Deutsch</a>
        </div>
      </section>
    </main>
  </body>
</html>

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # Run tests on Linux before building release bundles for all platforms
  test:
    name: Test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Verify release version matches tag
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"

          echo "Tag version: ${TAG_VERSION}"
          echo "package.json version: ${PACKAGE_VERSION}"
          echo "tauri.conf.json version: ${TAURI_VERSION}"

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag version does not match package.json version."
            exit 1
          fi

          if [ "${TAG_VERSION}" != "${TAURI_VERSION}" ]; then
            echo "Tag version does not match tauri.conf.json version."
            exit 1
          fi

      - name: Run frontend tests
        run: npm run test

      - name: Run Rust tests
        run: npm run test:rust

      - name: Run frontend build
        run: npm run build

  # Build release bundles for all platforms in parallel, only if tests pass
  build:
    name: Build (${{ matrix.label }})
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-22.04
            label: linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Build desktop bundles
        run: npm run tauri build

      - name: Collect Windows bundles
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe release-assets/ -Force
          Copy-Item src-tauri/target/release/bundle/msi/*.msi release-assets/ -Force

      - name: Collect macOS bundles
        if: matrix.label == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob

          for app in src-tauri/target/release/bundle/macos/*.app; do
            app_name="$(basename "$app")"
            ditto -c -k --sequesterRsrc --keepParent "$app" "release-assets/${app_name}.zip"
          done

          for dmg in src-tauri/target/release/bundle/dmg/*.dmg; do
            cp "$dmg" release-assets/
          done

      - name: Collect Linux bundles
        if: matrix.label == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/appimage/*.AppImage release-assets/
          cp src-tauri/target/release/bundle/deb/*.deb release-assets/
          cp src-tauri/target/release/bundle/rpm/*.rpm release-assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.label }}
          path: release-assets/*
          if-no-files-found: error

  # Create GitHub release with all bundles attached, only if build succeeds
  create-release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f CHANGELOG.txt ]; then
            echo "CHANGELOG.txt not found."
            exit 1
          fi

          if [ ! -s CHANGELOG.txt ]; then
            echo "CHANGELOG.txt is empty."
            exit 1
          fi

          CHANGELOG_CONTENT="$(cat CHANGELOG.txt)"

          {
            echo "# DLL Packer ${GITHUB_REF_NAME}"
            echo
            echo "$CHANGELOG_CONTENT"
          } > release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: DLL Packer ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/**/*
          draft: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Clear the changelog after a successful release to avoid confusion for future releases,
  # only if release creation succeeds
  cleanup-changelog:
    name: Cleanup changelog
    needs: create-release
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Empty CHANGELOG.txt
        shell: bash
        run: |
          set -euo pipefail

          if [ -f CHANGELOG.txt ]; then
            : > CHANGELOG.txt
            git add CHANGELOG.txt

            if git diff --cached --quiet; then
              echo "CHANGELOG.txt already empty"
            else
              git commit -m "Clear CHANGELOG after release ${GITHUB_REF_NAME}"
              git push origin main
            fi
          else
            echo "CHANGELOG.txt not found, nothing to clear"
          fi

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: 22.14.0

jobs:
  test:
    name: Test release candidate
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Verify release version matches tag
        shell: pwsh
        run: |
          $tagVersion = "${env:GITHUB_REF_NAME}".TrimStart("v")
          $packageVersion = node -p "require('./package.json').version"
          $tauriVersion = node -p "require('./src-tauri/tauri.conf.json').version"

          Write-Host "Tag version: $tagVersion"
          Write-Host "package.json version: $packageVersion"
          Write-Host "tauri.conf.json version: $tauriVersion"

          if ($tagVersion -ne $packageVersion) {
            Write-Error "Tag version does not match package.json version."
            exit 1
          }

          if ($tagVersion -ne $tauriVersion) {
            Write-Error "Tag version does not match tauri.conf.json version."
            exit 1
          }

      - name: Verify changelog is ready
        shell: pwsh
        run: |
          if (!(Test-Path CHANGELOG.txt)) {
            Write-Error "CHANGELOG.txt not found."
            exit 1
          }

          if ((Get-Item CHANGELOG.txt).Length -eq 0) {
            Write-Error "CHANGELOG.txt is empty."
            exit 1
          }

      - name: Run frontend tests
        run: npm run test

      - name: Run Rust tests
        run: npm run test:rust

      - name: Run frontend build
        run: npm run build

  build-windows:
    name: Build Windows EXE
    needs: test
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows installer bundles
        run: npm run tauri build

      - name: Collect Windows installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi -Filter *.msi -ErrorAction SilentlyContinue

          if (!$nsis) {
            Write-Error "No NSIS .exe installer found."
            exit 1
          }

          if (!$msi) {
            Write-Error "No MSI installer found."
            exit 1
          }

          $nsis | Copy-Item -Destination release-assets -Force
          $msi | Copy-Item -Destination release-assets -Force

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: release-assets/*
          if-no-files-found: error

  create-release:
    name: Create draft release
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release-assets

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f CHANGELOG.txt ]; then
            echo "CHANGELOG.txt not found."
            exit 1
          fi

          if [ ! -s CHANGELOG.txt ]; then
            echo "CHANGELOG.txt is empty."
            exit 1
          fi

          {
            echo "# Win DLL Packer ${GITHUB_REF_NAME}"
            echo
            cat CHANGELOG.txt
          } > release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: Win DLL Packer ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
          draft: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-changelog:
    name: Cleanup changelog
    needs: create-release
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Empty CHANGELOG.txt
        shell: bash
        run: |
          set -euo pipefail

          if [ -f CHANGELOG.txt ]; then
            : > CHANGELOG.txt
            git add CHANGELOG.txt

            if git diff --cached --quiet; then
              echo "CHANGELOG.txt already empty"
            else
              git commit -m "Clear CHANGELOG after release ${GITHUB_REF_NAME}"
              git push origin main
            fi
          else
            echo "CHANGELOG.txt not found, nothing to clear"
          fi

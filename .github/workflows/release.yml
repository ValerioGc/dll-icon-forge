name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: 22.14.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-tag-on-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semantic release tag
        shell: bash
        run: |
          set -euo pipefail

          semver_regex='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          if [[ ! "${GITHUB_REF_NAME}" =~ ${semver_regex} ]]; then
            echo "Tag ${GITHUB_REF_NAME} is not a valid release tag."
            echo "Use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease, for example v1.2.3 or v1.2.3-rc.1."
            exit 1
          fi

      - name: Verify tagged commit is on main
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main:refs/remotes/origin/main --prune
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} must point to a commit already reachable from main."
            exit 1
          fi

  test:
    name: Test release candidate
    needs: verify-tag-on-main
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Verify release version matches tag
        shell: pwsh
        run: |
          $tagVersion = "${env:GITHUB_REF_NAME}".TrimStart("v")
          $packageVersion = node -p "require('./package.json').version"
          $tauriVersion = node -p "require('./src-tauri/tauri.conf.json').version"

          Write-Host "Tag version: $tagVersion"
          Write-Host "package.json version: $packageVersion"
          Write-Host "tauri.conf.json version: $tauriVersion"

          if ($tagVersion -ne $packageVersion) {
            Write-Error "Tag version does not match package.json version."
            exit 1
          }

          if ($tagVersion -ne $tauriVersion) {
            Write-Error "Tag version does not match tauri.conf.json version."
            exit 1
          }

      - name: Verify changelog is ready
        shell: pwsh
        run: |
          if (!(Test-Path CHANGELOG.txt)) {
            Write-Error "CHANGELOG.txt not found."
            exit 1
          }

          if ((Get-Item CHANGELOG.txt).Length -eq 0) {
            Write-Error "CHANGELOG.txt is empty."
            exit 1
          }

      - name: Run Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run frontend tests
        run: npm run test

      - name: Run Rust tests
        run: npm run test:rust

      - name: Run frontend build
        run: npm run build

  build-windows:
    name: Build Windows installers
    needs: test
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows installer bundles
        run: npm run tauri build

      - name: Collect Windows installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi -Filter *.msi -ErrorAction SilentlyContinue

          if (!$nsis) {
            Write-Error "No NSIS .exe installer found."
            exit 1
          }

          if (!$msi) {
            Write-Error "No MSI installer found."
            exit 1
          }

          $nsis | Copy-Item -Destination release-assets -Force
          $msi | Copy-Item -Destination release-assets -Force

          $assets = Get-ChildItem -Path release-assets -File | Sort-Object Name
          $checksums = foreach ($asset in $assets) {
            $hash = Get-FileHash -Algorithm SHA256 -Path $asset.FullName
            "$($hash.Hash.ToLowerInvariant())  $($asset.Name)"
          }

          $checksums | Set-Content -Path release-assets/SHA256SUMS.txt -Encoding ascii

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: release-assets/*
          if-no-files-found: error

  create-release:
    name: Create draft release
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release-assets

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f CHANGELOG.txt ]; then
            echo "CHANGELOG.txt not found."
            exit 1
          fi

          if [ ! -s CHANGELOG.txt ]; then
            echo "CHANGELOG.txt is empty."
            exit 1
          fi

          {
            echo "# DLL Icon Forge ${GITHUB_REF_NAME}"
            echo
            cat CHANGELOG.txt
          } > release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: DLL Icon Forge ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
          draft: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

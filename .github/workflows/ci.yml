name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.14.0

jobs:

  # ── Runs on every push / PR ──────────────────────────────────────────────────
  test:
    name: Test
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Run Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run frontend tests
        run: npm run test

      - name: Run Rust tests
        run: npm run test:rust

      - name: Run frontend build
        run: npm run build

  # ── Only on version tags, after tests pass ───────────────────────────────────
  verify-release:
    name: Verify release
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate semantic version tag
        shell: bash
        run: |
          set -euo pipefail
          semver_regex='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "${GITHUB_REF_NAME}" =~ ${semver_regex} ]]; then
            echo "Tag ${GITHUB_REF_NAME} is not a valid release tag."
            echo "Use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease, e.g. v1.2.3 or v1.2.3-rc.1."
            exit 1
          fi

      - name: Verify tagged commit is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} must point to a commit already reachable from main."
            exit 1
          fi

      - name: Verify release version matches tag
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(node -p "require('./package.json').version")
          tauri_version=$(node -p "require('./src-tauri/tauri.conf.json').version")

          echo "Tag version:             $tag_version"
          echo "package.json version:    $pkg_version"
          echo "tauri.conf.json version: $tauri_version"

          if [[ "$tag_version" != "$pkg_version" ]]; then
            echo "Tag version does not match package.json version."
            exit 1
          fi

          if [[ "$tag_version" != "$tauri_version" ]]; then
            echo "Tag version does not match tauri.conf.json version."
            exit 1
          fi

      - name: Verify changelog exists and is not empty
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f CHANGELOG.txt ]]; then
            echo "CHANGELOG.txt not found."
            exit 1
          fi
          if [[ ! -s CHANGELOG.txt ]]; then
            echo "CHANGELOG.txt is empty."
            exit 1
          fi

  build-windows:
    name: Build Windows installers
    if: startsWith(github.ref, 'refs/tags/')
    needs: verify-release
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows installer bundles
        run: npm run tauri build

      - name: Collect Windows installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue
          $msi  = Get-ChildItem -Path src-tauri/target/release/bundle/msi  -Filter *.msi -ErrorAction SilentlyContinue

          if (!$nsis) { Write-Error "No NSIS .exe installer found."; exit 1 }
          if (!$msi)  { Write-Error "No MSI installer found.";       exit 1 }

          $nsis | Copy-Item -Destination release-assets -Force
          $msi  | Copy-Item -Destination release-assets -Force

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: release-assets/*
          if-no-files-found: error

  build-linux:
    name: Build Linux installers
    if: startsWith(github.ref, 'refs/tags/')
    needs: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux installer bundles
        run: npm run tauri -- build --bundles deb,appimage

      - name: Collect Linux installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          deb=$(find src-tauri/target/release/bundle/deb -name '*.deb' 2>/dev/null | head -1)
          appimage=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' 2>/dev/null | head -1)

          [[ -z "$deb" ]]      && { echo "No .deb installer found."; exit 1; }
          [[ -z "$appimage" ]] && { echo "No .AppImage found.";      exit 1; }

          cp "$deb" "$appimage" release-assets/

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: release-assets/*
          if-no-files-found: error

  create-release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release-assets

      - name: Download Linux installers
        uses: actions/download-artifact@v4
        with:
          name: linux-installers
          path: release-assets

      - name: Compute combined checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f CHANGELOG.txt ]]; then echo "CHANGELOG.txt not found."; exit 1; fi
          if [[ ! -s CHANGELOG.txt ]]; then echo "CHANGELOG.txt is empty.";  exit 1; fi
          { echo "# DLL Icon Forge ${GITHUB_REF_NAME}"; echo; cat CHANGELOG.txt; } > release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: DLL Icon Forge ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

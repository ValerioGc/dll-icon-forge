sonar.projectKey=dll-packer
sonar.projectName=dll-packer
sonar.host.url=http://localhost:9000

sonar.sources=src,src-tauri
sonar.tests=tests/frontend

sonar.sourceEncoding=UTF-8

sonar.exclusions=dist/**,node_modules/**,src-tauri/target/**,src-tauri/gen/**,src-tauri/icons/**,**/*.lock
sonar.test.inclusions=tests/frontend/**/*
sonar.coverage.exclusions=src-tauri/build.rs,src-tauri/src/main.rs,vite.config.ts

sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.rust.cargo.manifestPaths=src-tauri/Cargo.toml
sonar.rust.lcov.reportPaths=src-tauri/target/llvm-cov/lcov.info
